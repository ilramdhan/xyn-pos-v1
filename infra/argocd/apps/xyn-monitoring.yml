---
# ArgoCD Application: Observability stack
# Prometheus + Grafana + Loki + Jaeger → monitoring namespace

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: xyn-monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"   # Deploy before services
spec:
  project: default
  source:
    repoURL: https://github.com/ilramdhan/xyn-pos-v1
    targetRevision: HEAD
    path: infra/k8s/overlays/dev/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
