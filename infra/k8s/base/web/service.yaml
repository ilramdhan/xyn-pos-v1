apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    app: web
    part-of: xyn-pos
spec:
  selector:
    app: web
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - app.xyn-pos.dev   # Override per overlay
      secretName: web-tls
  rules:
    - host: app.xyn-pos.dev  # Override per overlay
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  name: http
