# EXAMPLE — SealedSecret for all 6 Go microservices
# Contains: DB URLs, Redis URL, Kafka brokers, PASETO keys, MinIO credentials
# To create:
#   kubectl create secret generic xyn-service-secrets \
#     --namespace xyn-services \
#     --from-literal=TENANT_DATABASE_URL="postgres://app_user:PASS@pgbouncer.xyn-infra:5432/xyn_tenant" \
#     --from-literal=POS_DATABASE_URL="postgres://app_user:PASS@pgbouncer.xyn-infra:5432/xyn_pos" \
#     --from-literal=PAYMENT_DATABASE_URL="postgres://app_user:PASS@pgbouncer.xyn-infra:5432/xyn_payment" \
#     --from-literal=INVENTORY_DATABASE_URL="postgres://app_user:PASS@pgbouncer.xyn-infra:5432/xyn_inventory" \
#     --from-literal=KITCHEN_DATABASE_URL="postgres://app_user:PASS@pgbouncer.xyn-infra:5432/xyn_kitchen" \
#     --from-literal=ANALYTICS_DATABASE_URL="postgres://app_user:PASS@pgbouncer.xyn-infra:5432/xyn_analytics" \
#     --from-literal=REDIS_URL="redis://:PASS@redis.xyn-infra:6379/0" \
#     --from-literal=KAFKA_BROKERS="kafka.xyn-infra:9092" \
#     --from-literal=PASETO_PRIVATE_KEY="CHANGE_ME_v4.local.base64..." \
#     --from-literal=MINIO_ACCESS_KEY="CHANGE_ME" \
#     --from-literal=MINIO_SECRET_KEY="CHANGE_ME" \
#     --from-literal=KEYCLOAK_CLIENT_SECRET="CHANGE_ME" \
#     --dry-run=client -o yaml | kubeseal --format yaml \
#     > infra/k8s/base/sealed-secrets/service-secrets.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: xyn-service-secrets
  namespace: xyn-services
spec:
  encryptedData:
    TENANT_DATABASE_URL: <SEALED_BASE64_HERE>
    POS_DATABASE_URL: <SEALED_BASE64_HERE>
    PAYMENT_DATABASE_URL: <SEALED_BASE64_HERE>
    INVENTORY_DATABASE_URL: <SEALED_BASE64_HERE>
    KITCHEN_DATABASE_URL: <SEALED_BASE64_HERE>
    ANALYTICS_DATABASE_URL: <SEALED_BASE64_HERE>
    REDIS_URL: <SEALED_BASE64_HERE>
    KAFKA_BROKERS: <SEALED_BASE64_HERE>
    PASETO_PRIVATE_KEY: <SEALED_BASE64_HERE>
    MINIO_ACCESS_KEY: <SEALED_BASE64_HERE>
    MINIO_SECRET_KEY: <SEALED_BASE64_HERE>
    KEYCLOAK_CLIENT_SECRET: <SEALED_BASE64_HERE>
  template:
    metadata:
      name: xyn-service-secrets
      namespace: xyn-services
    type: Opaque
