---
# ResourceQuota — xyn-services namespace
# WHY: Prevents a single runaway service from consuming all cluster resources.
# These limits are sized for a single-node K3s VPS (cx32: 8 vCPU, 16 GB RAM).
apiVersion: v1
kind: ResourceQuota
metadata:
  name: xyn-services-quota
  namespace: xyn-services
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 6Gi
    limits.cpu: "8"
    limits.memory: 12Gi
    pods: "50"
    services: "20"
    persistentvolumeclaims: "10"
---
# LimitRange — default container limits for xyn-services
# Applies to containers that don't specify resources explicitly
apiVersion: v1
kind: LimitRange
metadata:
  name: xyn-services-limits
  namespace: xyn-services
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 256Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 10m
        memory: 32Mi
    - type: Pod
      max:
        cpu: "4"
        memory: 4Gi
---
# ResourceQuota — xyn-infra namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: xyn-infra-quota
  namespace: xyn-infra
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 14Gi
    pods: "30"
    services: "20"
    persistentvolumeclaims: "20"
---
# LimitRange — xyn-infra (databases get higher defaults)
apiVersion: v1
kind: LimitRange
metadata:
  name: xyn-infra-limits
  namespace: xyn-infra
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: 250m
        memory: 512Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 50m
        memory: 64Mi
---
# ResourceQuota — dev overlay (much smaller — single VPS dev)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: xyn-dev-quota
  namespace: xyn-dev
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "30"
---
# ResourceQuota — staging overlay
apiVersion: v1
kind: ResourceQuota
metadata:
  name: xyn-staging-quota
  namespace: xyn-staging
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 4Gi
    limits.cpu: "6"
    limits.memory: 8Gi
    pods: "40"
