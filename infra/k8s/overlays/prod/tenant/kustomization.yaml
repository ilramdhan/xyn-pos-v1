apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xyn-prod

resources:
  - ../../../base/tenant
  - hpa.yaml
  - pdb.yaml

images:
  - name: ghcr.io/xyn-pos/xyn-pos-tenant
    # ArgoCD Image Updater will update this tag automatically
    newTag: latest

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 200m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 256Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 1000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi
    target:
      kind: Deployment
      name: tenant
