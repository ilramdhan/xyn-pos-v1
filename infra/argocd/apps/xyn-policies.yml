---
# ArgoCD Application: Network Policies + Resource Quotas
# Must apply BEFORE services to ensure zero-trust networking is in place at deploy time.
# sync-wave: -5 (after infra wave -10, before services wave 0)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: xyn-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
spec:
  project: default
  source:
    repoURL: https://github.com/ilramdhan/xyn-pos-v1
    targetRevision: HEAD
    path: infra/k8s/overlays/dev/policies   # change to staging/prod/policies per cluster

  destination:
    server: https://kubernetes.default.svc
    namespace: xyn-infra   # nominal namespace; resources define their own namespaces

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
