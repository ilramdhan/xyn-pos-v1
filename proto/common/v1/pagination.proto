syntax = "proto3";

package common.v1;

option go_package = "github.com/xyn-pos/gen/common/v1;commonv1";

// PaginationRequest — cursor-based pagination input
message PaginationRequest {
  // Maximum items to return (default: 20, max: 100)
  int32 limit = 1;

  // Opaque cursor from previous response (empty = first page)
  string cursor = 2;
}

// PaginationMeta — returned in every list response
message PaginationMeta {
  int32  total       = 1;
  int32  page        = 2;
  int32  per_page    = 3;
  bool   has_next    = 4;
  string next_cursor = 5;
}
