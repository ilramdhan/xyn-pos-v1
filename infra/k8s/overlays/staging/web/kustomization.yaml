apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xyn-staging

resources:
  - ../../../base/web

images:
  - name: ghcr.io/xyn-pos/xyn-pos-web
    newTag: staging

patches:
  - patch: |-
      - op: replace
        path: /data/NEXT_PUBLIC_API_URL
        value: https://api.staging.xyn-pos.dev
      - op: replace
        path: /data/NEXT_PUBLIC_APP_ENV
        value: staging
    target:
      kind: ConfigMap
      name: web-config
  - patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: app.staging.xyn-pos.dev
      - op: replace
        path: /spec/tls/0/hosts/0
        value: app.staging.xyn-pos.dev
      - op: replace
        path: /spec/tls/0/secretName
        value: web-staging-tls
    target:
      kind: Ingress
      name: web
