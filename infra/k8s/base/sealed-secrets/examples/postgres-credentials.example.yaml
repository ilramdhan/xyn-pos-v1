# EXAMPLE — shows the structure of the SealedSecret for postgres-credentials
# To create the real one:
#   kubectl create secret generic postgres-credentials \
#     --namespace xyn-infra \
#     --from-literal=username=app_user \
#     --from-literal=password=CHANGE_ME \
#     --from-literal=migration-username=migration_user \
#     --from-literal=migration-password=CHANGE_ME \
#     --from-literal=pgbouncer-admin-password=CHANGE_ME \
#     --dry-run=client -o yaml | kubeseal --format yaml \
#     > infra/k8s/base/sealed-secrets/postgres-credentials.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-credentials
  namespace: xyn-infra
spec:
  encryptedData:
    username: <SEALED_BASE64_HERE>
    password: <SEALED_BASE64_HERE>
    migration-username: <SEALED_BASE64_HERE>
    migration-password: <SEALED_BASE64_HERE>
    pgbouncer-admin-password: <SEALED_BASE64_HERE>
  template:
    metadata:
      name: postgres-credentials
      namespace: xyn-infra
    type: Opaque
