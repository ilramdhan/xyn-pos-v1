apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen
  labels:
    app: kitchen
    part-of: xyn-pos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen
  template:
    metadata:
      labels:
        app: kitchen
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8055"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kitchen
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: kitchen
          image: ghcr.io/xyn-pos/xyn-pos-kitchen:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 50055
              protocol: TCP
            - name: http
              containerPort: 8055
              protocol: TCP
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: kitchen-config
                  key: APP_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kitchen-secret
                  key: DATABASE_URL
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: kitchen-config
                  key: KAFKA_BROKERS
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: kitchen-config
                  key: REDIS_HOST
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: kitchen-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: kitchen-config
                  key: LOG_LEVEL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            grpc:
              port: 50055
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            grpc:
              port: 50055
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
