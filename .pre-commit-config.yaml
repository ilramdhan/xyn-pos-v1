# pre-commit hooks for xyn-pos-v1
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Docs: https://pre-commit.com

repos:
  # ─────────────────────────────────────────────────────────
  # Standard file hygiene
  # ─────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: detect-private-key

  # ─────────────────────────────────────────────────────────
  # Secrets scanning
  # ─────────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.25.1
    hooks:
      - id: gitleaks

  # ─────────────────────────────────────────────────────────
  # Go
  # ─────────────────────────────────────────────────────────
  - repo: https://github.com/dnephin/pre-commit-golang
    rev: v0.5.1
    hooks:
      - id: go-fmt
      - id: go-vet-mod
      - id: go-unit-tests

  - repo: local
    hooks:
      # golangci-lint v2 (local install required)
      - id: golangci-lint
        name: golangci-lint
        language: system
        entry: golangci-lint run
        types: [go]
        pass_filenames: false

      # buf lint for proto changes
      - id: buf-lint
        name: buf lint
        language: system
        entry: buf lint proto/
        files: \.proto$
        pass_filenames: false

      # buf format check
      - id: buf-format
        name: buf format check
        language: system
        entry: buf format --diff proto/
        files: \.proto$
        pass_filenames: false

  # ─────────────────────────────────────────────────────────
  # YAML / JSON formatting
  # ─────────────────────────────────────────────────────────
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: [--strict]
        exclude: ^(infra/|docs/)
