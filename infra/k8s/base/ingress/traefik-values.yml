# Traefik v3 Helm values for xyn-pos-v1
# Installed in kube-system namespace

deployment:
  replicas: 1

service:
  type: LoadBalancer

ports:
  web:
    port: 80
    redirectTo:
      port: websecure     # HTTP → HTTPS redirect
  websecure:
    port: 443
    tls:
      enabled: true

# Enable dashboard (restrict access in production)
ingressRoute:
  dashboard:
    enabled: true
    entryPoints: ["websecure"]

# Access logs — structured JSON for Loki ingestion
logs:
  general:
    level: INFO
  access:
    enabled: true
    format: json

# Metrics endpoint for Prometheus scraping
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true

additionalArguments:
  - "--api.insecure=false"
  - "--providers.kubernetescrd.allowCrossNamespace=true"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
