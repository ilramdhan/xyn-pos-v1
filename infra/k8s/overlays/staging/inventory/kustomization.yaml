apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xyn-staging

resources:
  - ../../../base/inventory

images:
  - name: ghcr.io/xyn-pos/xyn-pos-inventory
    newTag: staging

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /data/APP_ENV
        value: staging
    target:
      kind: Deployment
      name: inventory
