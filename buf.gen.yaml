# Buf 1.70.0 — Code generation configuration
# Run: buf generate proto/
# Generates: Go, TypeScript (Connect-RPC), Dart

version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/xyn-pos/gen

plugins:
  # ─────────────────────────────────────────────────
  # Go — protobuf messages
  # ─────────────────────────────────────────────────
  - remote: buf.build/protocolbuffers/go:v1.36.5
    out: gen/go
    opt:
      - paths=source_relative

  # Go — gRPC service stubs
  - remote: buf.build/grpc/go:v1.5.1
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false

  # Go — gRPC-Gateway (REST transcoding)
  - remote: buf.build/grpc-ecosystem/gateway:v2.26.3
    out: gen/go
    opt:
      - paths=source_relative
      - generate_unbound_methods=true

  # Go — OpenAPI v3 (for Swagger UI and KrakenD)
  - remote: buf.build/grpc-ecosystem/openapiv2:v2.26.3
    out: gen/openapi
    opt:
      - output_format=yaml
      - allow_merge=true
      - merge_file_name=api

  # ─────────────────────────────────────────────────
  # TypeScript — Connect-RPC (for Next.js 16 frontend)
  # ─────────────────────────────────────────────────
  - remote: buf.build/connectrpc/es:v1.6.1
    out: gen/ts
    opt:
      - target=ts
      - import_extension=.js

  # TypeScript — protobuf-es messages
  - remote: buf.build/bufbuild/es:v2.5.2
    out: gen/ts
    opt:
      - target=ts
      - import_extension=.js

  # ─────────────────────────────────────────────────
  # Dart — for Flutter mobile app
  # ─────────────────────────────────────────────────
  - remote: buf.build/grpc/dart:v0.1.0
    out: gen/dart
