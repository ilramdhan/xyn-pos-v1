---
# cert-manager ClusterIssuer — Let's Encrypt production
# Applies across all namespaces
#
# Prerequisites:
#   - Your domain DNS must point to the K3s node's public IP
#   - Port 80 must be reachable for HTTP-01 challenge

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    # Replace with your real email
    email: it@mutugading.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: traefik

---
# Staging issuer — use for testing to avoid Let's Encrypt rate limits
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: it@mutugading.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
