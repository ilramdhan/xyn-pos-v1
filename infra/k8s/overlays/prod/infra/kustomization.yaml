apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: xyn-infra

resources:
  - ../../../base/infra

patches:
  - patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 100Gi
    target:
      kind: StatefulSet
      name: postgres
  - patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 100Gi
    target:
      kind: StatefulSet
      name: kafka
