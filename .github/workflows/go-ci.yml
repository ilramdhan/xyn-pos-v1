name: Go CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'shared/go/**'
      - 'go.work'
      - '.golangci.yml'

env:
  GO_VERSION: "1.26.4"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # golangci-lint-action@v7 required for golangci-lint v2.x
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          args: --timeout=5m

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests
        # find all domain packages; skip gracefully if none exist yet
        run: |
          PKGS=$(go list ./services/.../internal/domain/... 2>/dev/null || true)
          if [ -z "$PKGS" ]; then
            echo "No domain packages found yet — skipping (expected during scaffolding phase)"
            exit 0
          fi
          go test -v -race -count=1 -coverprofile=coverage.out $PKGS

      - name: Upload coverage
        if: hashFiles('coverage.out') != ''
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgres://test_user:test_password@localhost:5432/test_db?sslmode=disable
        # find infrastructure packages; skip gracefully if none exist yet
        run: |
          PKGS=$(go list -tags=integration ./services/.../internal/infrastructure/... 2>/dev/null || true)
          if [ -z "$PKGS" ]; then
            echo "No infrastructure packages found yet — skipping (expected during scaffolding phase)"
            exit 0
          fi
          go test -v -race -count=1 -tags=integration -timeout=120s $PKGS

  build:
    name: Build All Services
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build all services
        run: make build-all

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4
          PKGS=$(go list ./... 2>/dev/null | grep -v '/gen/' || true)
          if [ -z "$PKGS" ]; then
            echo "No packages found yet — skipping gosec"
            exit 0
          fi
          gosec $PKGS

      # govulncheck-action@v1 doesn't support go.work — run manually per module
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          for mod in shared/go services/tenant services/pos services/payment services/inventory services/kitchen services/analytics; do
            if [ -f "$mod/go.mod" ]; then
              echo "--- govulncheck: $mod ---"
              govulncheck -C "$mod" ./...
            fi
          done
